app = "erdeer"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

# A volume attaches to a single machine, so a new machine cannot start
# alongside the old one during a deploy. Stop and replace in place.
[deploy]
  strategy = "immediate"

[env]
  HOST = "0.0.0.0"
  PORT = "3000"
  DATABASE_PATH = "data/db.sqlite"

# SQLite is a single local file, so the app runs as exactly one machine
# backed by one persistent volume. Do not scale beyond a single machine.
[mounts]
  source = "erdeer_data"
  destination = "/app/packages/backend/data"

[http_service]
  internal_port = 3000
  force_https = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"
    method = "get"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
