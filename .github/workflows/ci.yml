name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: make install
      - run: make lint

  deploy:
    needs: lint
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - uses: docker/setup-buildx-action@v4

      # Build in the runner (not Fly's builder). load:true puts the image in the
      # local Docker daemon so we can push it after authenticating, and gha cache
      # reuses layers across runs so the two pnpm installs aren't repeated cold.
      - uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: registry.fly.io/erdeer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Authenticate right before pushing: fly auth docker tokens expire in ~5 min,
      # so doing it after the (slow) build avoids an expired-token push failure.
      - name: Push image to Fly registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl auth docker
          docker push registry.fly.io/erdeer:${{ github.sha }}

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --app erdeer --image registry.fly.io/erdeer:${{ github.sha }}
